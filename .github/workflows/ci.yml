name: E2E CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * *'

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BASE_URL: https://demoqa.com
  HEADLESS: 'true'
  DEVICE: desktop
  WAIT_MS: '10000'
  NAVIGATION_TIMEOUT_MS: '60000'
  PARALLEL: '1'
  CI: 'true'

jobs:
  quality-check:
    name: TypeScript quality check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check TypeScript
        run: npm run typecheck

  api-tests:
    name: Book Store API tests
    needs: quality-check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      REPORT_ID: ${{ github.run_id }}-api-${{ github.run_attempt }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run API tests
        run: npm run test:api

      - name: Upload API reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-report-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            reports/html/
            reports/json/
            reports/screenshots/
            test-results/
          if-no-files-found: warn
          retention-days: 14

  ui-tests:
    name: UI - ${{ matrix.name }}
    needs: quality-check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        include:
          - name: authentication
            script: test:auth
          - name: bookstore
            script: test:bookstore
          - name: elements
            script: test:elements
          - name: forms
            script: test:forms
          - name: alerts-frames-windows
            script: test:alerts-frame-windows
          - name: widgets
            script: test:widgets
          - name: interactions
            script: test:interactions
    env:
      REPORT_ID: ${{ github.run_id }}-${{ matrix.name }}-${{ github.run_attempt }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium and system dependencies
        run: npx playwright install --with-deps chromium

      - name: Run ${{ matrix.name }} tests
        run: npm run ${{ matrix.script }}

      - name: Upload ${{ matrix.name }} reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-${{ matrix.name }}-report-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            reports/html/
            reports/json/
            reports/screenshots/
            test-results/
          if-no-files-found: warn
          retention-days: 14
